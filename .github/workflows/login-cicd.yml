name: Login API CI/CD to GCP

on:
  push:
    branches: [ "main", "login" ]
    paths:
      - 'login/**'
      - '.github/workflows/login-cicd.yml'
  pull_request:
    branches: [ "main", "login" ]
    paths:
      - 'login/**'
      - '.github/workflows/login-cicd.yml'

env:
  PROJECT_ID: 'touristassistant-29-03-2026'
  REGION: 'asia-southeast1'
  GAR_REPO: 'tourism-frontend'
  SERVICE_NAME: 'tourism-login-api'
  IMAGE_NAME: 'login-api'

# Required for Workload Identity Federation
permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  # ── Job 1 : Dependency Audit ───────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: login/package-lock.json

      - name: Install dependencies
        working-directory: login
        run: npm ci

      - name: Run npm audit
        working-directory: login
        run: npm audit --omit=dev || true

  # ── Job 2 : Docker Compose Integration Test ──────────────────────────────
  integration-test:
    name: Integration Test (Docker Compose)
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env from defaults
        run: cp .env.example .env

      - name: Start services via Docker Compose
        run: docker compose up -d --build --wait

      - name: Wait for Login API to be ready
        run: |
          echo "Waiting for Login API to respond on port 5036..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5036/api/auth 2>&1; then
              echo "Login API is up!"
              exit 0
            fi
            echo "  attempt $i/30 — not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "Login API failed to start in time."
          docker compose logs login
          exit 1

      - name: Verify PostgreSQL is healthy
        run: |
          docker compose exec -T postgres pg_isready -U tourist
          echo "PostgreSQL is healthy"

      - name: Verify MongoDB is healthy
        run: |
          docker compose exec -T mongodb mongosh --eval "db.adminCommand('ping')" -u tourist -p tourist_secret --authenticationDatabase admin
          echo "MongoDB is healthy"

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── Job 3 : Build & Deploy ──────────────────────────────────────────────
  deploy:
    name: Build & Deploy to Cloud Run
    needs: integration-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Authenticate to GCP via WIF
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 2. Configure Docker to use GCP Artifact Registry
      - name: Configure Docker Auth
        run: |-
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # 3. Build & Push using the Login Dockerfile
      - name: Build and Push Docker Image
        working-directory: ./login
        run: |-
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t $DOCKER_TAG .
          docker push $DOCKER_TAG

      # 4. Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |-
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image $DOCKER_TAG \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 5036 \
            --set-env-vars="\
          NODE_ENV=production,\
          POSTGRES_URL=${{ secrets.POSTGRES_URL }},\
          JWT_SECRET=${{ secrets.JWT_SECRET }},\
          JWT_EXPIRES_IN=1d,\
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},\
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},\
          GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }},\
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }},\
          FRONTEND_URL=https://tourism-frontend-app-367022044809.asia-southeast1.run.app"
