version: '3.8'

services:
  tourist-service:
    build:
      context: .
      dockerfile: dockerfile     
    container_name: tourist-be
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - WEATHER_API_KEY=${WEATHER_API_KEY}
      - LOCATION_API_KEY=${LOCATION_API_KEY}
      - REDIS_ADDR=redis_cache:6379
    depends_on:
      - redis_cache

  redis_cache:
    image: redis:alpine
  
  postgres_db:
    image: postgres:latest
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_ROOT_PASSWORD: root