###############################################################################
#  Tourist Assistant — Docker Compose (Local Development)
#
#  Services:
#    1. frontend   — Next.js app (built from ./frontend/Dockerfile)
#    2. postgres   — PostgreSQL 16 (relational data)
#    3. mongodb    — MongoDB 7   (document data)
#    4. pgadmin    — pgAdmin 4   (Postgres web UI)  — http://localhost:5050
#    5. mongo-express — Mongo Express (MongoDB web UI) — http://localhost:8081
#
#  Usage:
#    docker compose up -d --build        # start everything
#    docker compose logs -f frontend     # tail the app logs
#    docker compose down -v              # tear down + delete volumes
###############################################################################

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ta_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tourist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tourist_secret}
      POSTGRES_DB: ${POSTGRES_DB:-tourist_assistant}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tourist}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ta_network

  # ─── MongoDB ───────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: ta_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-tourist}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-tourist_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-tourist_assistant}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ta_network

  # ─── Express Login API ────────────────────────────────────────────────
  login:
    build:
      context: ./login
      dockerfile: Dockerfile
    container_name: ta_login
    restart: unless-stopped
    ports:
      - "5036:5036"
    env_file:
      - ./login/.env
    environment:
      NODE_ENV: production
      PORT: 5036
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER:-tourist}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-tourist_secret}
      DB_NAME: ${POSTGRES_DB:-tourist_assistant}
      DB_DIALECT: postgres
      DB_PORT: 5432
      POSTGRES_URL: postgresql://tourist:tourist_secret@postgres:5432/tourist_assistant
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - ta_network

  # ─── Next.js Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ta_frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      # Database connection strings — the hostnames match the service names
      DATABASE_URL: postgresql://${POSTGRES_USER:-tourist}:${POSTGRES_PASSWORD:-tourist_secret}@postgres:5432/${POSTGRES_DB:-tourist_assistant}
      MONGODB_URI: mongodb://${MONGO_USER:-tourist}:${MONGO_PASSWORD:-tourist_secret}@mongodb:27017/${MONGO_DB:-tourist_assistant}?authSource=admin
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - ta_network

  # ─── Nginx API Gateway ────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ta_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      LOGIN_API_URL: ${LOGIN_API_URL:-http://localhost:5036}
      SSL_TOGGLE: ${SSL_TOGGLE:-on}
      HOST_HEADER: ${HOST_HEADER:-localhost}
      DNS_RESOLVER: ${DNS_RESOLVER:-8.8.8.8}
    depends_on:
      - frontend
      - login
    networks:
      - ta_network

  # ─── pgAdmin (Postgres Web UI) ────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ta_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@tourist.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - ta_network

  # ─── Mongo Express (MongoDB Web UI) ───────────────────────────────────
  mongo-express:
    image: mongo-express:1-20
    container_name: ta_mongo_express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-tourist}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-tourist_secret}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-tourist}:${MONGO_PASSWORD:-tourist_secret}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ta_network

# ─── Volumes ──────────────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  mongodata:
    driver: local
  pgadmin_data:
    driver: local

# ─── Network ──────────────────────────────────────────────────────────────
networks:
  ta_network:
    driver: bridge
